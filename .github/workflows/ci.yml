name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install lint tools
        run: uv pip install ruff black isort mypy

      - name: Run Ruff
        run: ruff check packages/ --output-format=github

      - name: Check Black formatting
        run: black --check --target-version=py311 packages/

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.10"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install -r requirements-dev.txt
          uv pip install -e packages/core
          uv pip install -e packages/libraries

      - name: Run tests
        run: |
          pytest packages/core/tests -v --tb=short --cov=src --cov-report=xml
          cd packages/libraries && pytest tests -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-ui:
    name: Test Studio UI
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: packages/studio
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: packages/studio
        run: pnpm test

      - name: Type check
        working-directory: packages/studio
        run: pnpm exec tsc --noEmit

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: [test, test-ui]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install build tools
        run: uv pip install build

      - name: Build core package
        run: python -m build packages/core

      - name: Build libraries package
        run: python -m build packages/libraries

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
