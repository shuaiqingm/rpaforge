name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy
      
      - name: Run Ruff
        run: ruff check packages/ --output-format=github
      
      - name: Check Black formatting
        run: black --check --target-version=py311 packages/

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.10"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e packages/core
          pip install -e packages/libraries
      
      - name: Run tests
        run: |
          pytest packages/core/tests -v --tb=short --cov=src --cov-report=xml
          cd packages/libraries && pytest tests -v --tb=short
      
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-ui:
    name: Test Studio UI
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      
      - name: Install dependencies
        working-directory: packages/studio
        run: npm ci
      
      - name: Run tests
        working-directory: packages/studio
        run: npm test
       
      - name: Type check
        working-directory: packages/studio
        run: npx tsc --noEmit

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: [test, test-ui]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install build tools
        run: pip install build
      
      - name: Build core package
        run: python -m build packages/core
      
      - name: Build libraries package
        run: python -m build packages/libraries
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
