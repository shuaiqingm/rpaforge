name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          allow-python-downloads: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Run Ruff
        run: uvx ruff check packages/ --output-format=github

      - name: Check Black formatting
        run: uvx black --check packages/

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.10"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          allow-python-downloads: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest packages/core/tests -v --tb=short --cov=src --cov-report=xml && cd packages/libraries && uv run pytest tests -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-ui:
    name: Test Studio UI
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: packages/studio
        run: pnpm install

      - name: Run tests
        working-directory: packages/studio
        run: pnpm test

      - name: Type check
        working-directory: packages/studio
        run: pnpm exec tsc --noEmit

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: [test, test-ui]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          allow-python-downloads: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install build tools
        run: uv sync

      - name: Build packages
        run: uv run python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
