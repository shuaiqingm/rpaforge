version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "chelslava"
    labels:
      - "dependencies"
    groups:
      python-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Security: auto-merge security updates
    commit-message:
      prefix: "sec"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/packages/studio"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "chelslava"
    labels:
      - "dependencies"
    groups:
      npm-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "sec"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    reviewers:
      - "chelslava"
    labels:
      - "dependencies"
      - "ci"

  # Security vulnerability alerts for GitHub Advisories
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    # Automatically create PRs for GitHub security advisories
    open-pull-requests-limit: 10
    labels:
      - "security"
      - "dependencies"
    groups:
      security-fixes:
        patterns:
          - "*"
    commit-message:
      prefix: "fix"
      include: "scope"
