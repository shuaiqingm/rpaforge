[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rpaforge-core"
version = "0.3.3"
description = "Core engine for RPAForge - Native Python execution with debugging support"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
authors = [
    {name = "RPAForge Contributors"}
]
keywords = [
    "rpa",
    "automation",
    "debugger",
    "execution-engine",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "psutil>=5.9.0",
]

[project.optional-dependencies]
subprocess = [
    "psutil>=5.9",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "ruff>=0.15.0",
    "mypy>=1.0",
    "psutil>=5.9",
]

[project.urls]
Homepage = "https://github.com/chelslava/rpaforge"
Repository = "https://github.com/chelslava/rpaforge.git"
Issues = "https://github.com/chelslava/rpaforge/issues"

[tool.setuptools.packages.find]
where = ["src"]
